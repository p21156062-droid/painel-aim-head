<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel AIM HEAD</title>

<style>
body {
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Arial;
}

canvas {
    position:fixed;
    top:0;
    left:0;
}

.panel {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    padding:20px;
    border-radius:20px;
    background:rgba(20,20,40,0.6);
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px #7B2EFF;
    animation:glow 3s infinite;
}

@keyframes glow {
    0% { box-shadow:0 0 10px #7B2EFF; }
    50% { box-shadow:0 0 30px #00E5FF; }
    100% { box-shadow:0 0 10px #7B2EFF; }
}

.switch {
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.crosshair {
    position:fixed;
    top:50%;
    left:50%;
    width:20px;
    height:20px;
    border:2px solid red;
    transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="crosshair"></div>

<div class="panel">
<h2>🌌 AIM HEAD</h2>
<p>SilvaX</p>

<div class="switch">
<span>Aim Guide</span>
<input type="checkbox">
</div>

<div class="switch">
<span>Recoil Guide</span>
<input type="checkbox">
</div>

<div class="switch">
<span>FOV Guide</span>
<input type="checkbox">
</div>

<select onchange="changeColor(this.value)">
<option value="#7B2EFF">Roxo</option>
<option value="#00E5FF">Azul</option>
<option value="#FF2E9A">Rosa</option>
<option value="#00FF9C">Verde</option>
</select>

</div>

<script>
function changeColor(c){
    document.querySelector('.panel').style.boxShadow="0 0 30px "+c;
}

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<100;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();

        s.y += 0.5;
        if(s.y > canvas.height) s.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
